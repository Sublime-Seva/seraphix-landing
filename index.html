<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seraphix Systems</title>
  <meta name="description" content="Seraphix Systems" />
  <meta name="theme-color" content="#05070b" />
  <meta property="og:title" content="Seraphix Systems" />
  <meta property="og:description" content="Precision. Depth. Autonomy." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #05070b;
      --text: #f4f7fc;
      --muted: #8f98ab;
      --line: rgba(255, 74, 74, 0.16);
      --accent: #ff3333;
      --accent-2: #ff6b4a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Geist', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, rgba(124, 132, 255, 0.12), transparent 28%),
        radial-gradient(circle at 85% 12%, rgba(255, 51, 51, 0.10), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(255, 107, 74, 0.06), transparent 30%),
        linear-gradient(180deg, #05070b 0%, #090b10 46%, #05070b 100%);
      line-height: 1.6;
    }

    a { color: inherit; text-decoration: none; }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
      text-align: center;
    }

    .mark {
      width: 64px;
      height: 64px;
      padding: 10px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(255, 51, 51, 0.22), rgba(255, 107, 74, 0.14));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06), 0 18px 40px rgba(0,0,0,0.5);
      margin-bottom: 28px;
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06), 0 18px 40px rgba(0,0,0,0.5); }
      50% { box-shadow: inset 0 0 0 1px rgba(255,255,255,0.10), 0 18px 50px rgba(255,51,51,0.12); }
    }

    h1 {
      font-size: clamp(2.2rem, 5vw, 3.6rem);
      letter-spacing: -0.06em;
      line-height: 1.05;
      margin-bottom: 6px;
      max-width: 12ch;
    }

    .tagline {
      color: var(--muted);
      font-size: 0.85rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-family: 'Geist Mono', ui-monospace, monospace;
      margin-bottom: 36px;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-2), transparent);
      margin: 0 auto 36px;
    }

    .statement {
      max-width: 48ch;
      color: #9aa3b5;
      font-size: 1.02rem;
      line-height: 1.7;
      margin-bottom: 44px;
    }

    .contact {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      border-radius: 999px;
      border: 1px solid rgba(255, 74, 74, 0.25);
      background: rgba(255, 255, 255, 0.025);
      color: #c8d0dd;
      font-size: 0.94rem;
      font-family: 'Geist Mono', ui-monospace, monospace;
      transition: border-color 0.25s ease, background 0.25s ease;
    }

    .contact:hover {
      border-color: rgba(255, 74, 74, 0.5);
      background: rgba(255, 255, 255, 0.04);
    }

    .contact::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 14px rgba(255, 107, 74, 0.7);
    }

    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 0.82rem;
      border-top: 1px solid rgba(255,255,255,0.04);
      background: rgba(5, 7, 11, 0.7);
      backdrop-filter: blur(10px);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="mark" aria-hidden="true">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M24 5L40 13.5V34.5L24 43L8 34.5V13.5L24 5Z" stroke="url(#g1)" stroke-width="2.2" />
        <path d="M16 28.5L24 13L32 28.5H16Z" stroke="url(#g2)" stroke-width="2.2" stroke-linejoin="round" />
        <path d="M19.5 28.5H28.5L24 36L19.5 28.5Z" fill="url(#g3)" />
        <defs>
          <linearGradient id="g1" x1="8" y1="5" x2="41" y2="43" gradientUnits="userSpaceOnUse">
            <stop stop-color="#FF3333" />
            <stop offset="1" stop-color="#FF6B4A" />
          </linearGradient>
          <linearGradient id="g2" x1="16" y1="13" x2="34" y2="34" gradientUnits="userSpaceOnUse">
            <stop stop-color="#FFE0D0" />
            <stop offset="1" stop-color="#FF6B4A" />
          </linearGradient>
          <linearGradient id="g3" x1="19.5" y1="28.5" x2="28.5" y2="36" gradientUnits="userSpaceOnUse">
            <stop stop-color="#FFB347" />
            <stop offset="1" stop-color="#FF6B4A" />
          </linearGradient>
        </defs>
      </svg>
    </div>

    <h1>Seraphix Systems</h1>
    <div class="tagline">Precision. Depth. Autonomy.</div>

    <div class="divider"></div>

    <p class="statement">
      Seraphix Systems is a proprietary trading firm. We deploy autonomous,
      systematic strategies across a focused set of derivatives — pursuing
      precision over scale, depth over breadth, and discipline over speed.
    </p>

    <a class="contact" href="mailto:seva@seraphix.systems">seva@seraphix.systems</a>
  </div>

  <footer>© Seraphix Systems</footer>
</body>
</html>
